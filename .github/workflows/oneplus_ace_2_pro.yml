name: OnePlus_Ace_2_Pro
on:
  workflow_dispatch:
    inputs:
      enable_feature_x:
        description: "是否启用KPM"
        required: false
        default: false
        type: boolean
      enable_feature_y:
        description: "跳过版本比较"
        required: false
        default: false
        type: boolean
      enable_feature_z:
        description: "不发布release"
        required: false
        default: true
        type: boolean
  
  schedule:
    - cron: '0 22 * * *'
      
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_DIR: /home/runner/.ccache  
      CCACHE_MAXSIZE: 8G
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          
      - name: Configure Git
        run: |
         git config --global user.name "BaihaWhite"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 git curl ccache zip lld

      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Compare Version
        id: check
        if: ${{!inputs.enable_feature_y}}
        run: |
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git SUKI/
          cd SUKI
          KSU_GIT_VERSION=$(git rev-list --count HEAD)
          KSU_VERSION=$((37185 + KSU_GIT_VERSION))
          LATEST_TAG=$(git ls-remote --tags https://github.com/BaihaWhite/oneplus13_a5p_sukisu.git | tail -n1 | sed 's/.*\///')
          if [ $LATEST_TAG -eq $KSU_VERSION ];then
            echo "should_cancel=yes" >> $GITHUB_OUTPUT
          fi

      - name: Install repo tool
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
         chmod a+x ~/repo
         sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         mkdir kernel_workspace && cd kernel_workspace
         repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/sm8550 -m oneplus_ace2_pro_b.xml --depth=1
         repo --trace sync -c -j$(nproc --all) --no-tags
         rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
         rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"
         
      - name: Set up SukiSU
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         echo DATE=$(date +%F) >> $GITHUB_ENV
         cd kernel_workspace/kernel_platform
         curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
         cd ./KernelSU
         KSU_VERSION=$(expr $(/usr/bin/git rev-list --count main) "+" 37185)
         echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
         export KSU_VERSION=$KSU_VERSION
         awk -v old='v$1-$(shell cd $(KSU_SRC); $(GIT_BIN) rev-parse --short=8 HEAD)@$(shell cd $(KSU_SRC); $(GIT_BIN) rev-parse --abbrev-ref HEAD)' -v new='v$1-$(KSU_VERSION)-酷安@骁龙8Gen2' '
             index($0, old) {
                 $0 = substr($0, 1, index($0, old)-1) new substr($0, index($0, old) + length(old))
             }
             { print }
         ' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
      
      - name: Check kernel version
        if: steps.check.outputs.should_cancel != 'yes'
        id: kernel_version
        run: |
          cd kernel_workspace/kernel_platform/common
          KERNEL_VERSION=$(head -n 1 Makefile | sed 's/VERSION = //')
          KERNEL_PATCHLEVEL=$(head -n 2 Makefile | tail -n 1 | sed 's/PATCHLEVEL = //')
          KERNEL_SUBLEVEL=$(head -n 3 Makefile | tail -n 1 | sed 's/SUBLEVEL = //')
          echo "kernel_version=${KERNEL_VERSION}.${KERNEL_PATCHLEVEL}.${KERNEL_SUBLEVEL}" >> $GITHUB_OUTPUT
          echo "Detected kernel version: ${KERNEL_VERSION}.${KERNEL_PATCHLEVEL}.${KERNEL_SUBLEVEL}"

      - name: Set up susfs
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
           cd kernel_workspace
           
           # 根据内核版本选择 SUSFS 分支
           KERNEL_VERSION="${{ steps.kernel_version.outputs.kernel_version }}"
           echo "Kernel version: $KERNEL_VERSION"
           
           # 检查内核版本是否为 6.6 或更高
           if [[ "$KERNEL_VERSION" == 6.6* ]] || [[ "$KERNEL_VERSION" == 6.7* ]] || [[ "$KERNEL_VERSION" == 6.8* ]] || [[ "$KERNEL_VERSION" == 6.9* ]] || [[ "$KERNEL_VERSION" == 6.1* ]]; then
             SUSFS_BRANCH="gki-android15-6.6"
             echo "Using SUSFS branch: $SUSFS_BRANCH"
           else
             SUSFS_BRANCH="gki-android14-5.15"
             echo "Using SUSFS branch: $SUSFS_BRANCH (for older kernel)"
           fi
           
           git clone https://gitlab.com/simonpunk/susfs4ksu.git -b $SUSFS_BRANCH
           git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git

           cd kernel_platform        
           
           # 检查 SUSFS 补丁文件是否存在
           if [ -f "../susfs4ksu/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch" ]; then
             cp ../susfs4ksu/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch ./common/
           else
             echo "SUSFS patch file not found for branch $SUSFS_BRANCH, skipping SUSFS"
             echo "SUSFS_DISABLED=true" >> $GITHUB_ENV
           fi
           
           if [ "$SUSFS_DISABLED" != "true" ]; then
             cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
             cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
             
             #lz4k
             cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./common/include/linux
             cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./common/lib
             cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./common/crypto
             cp -r ../SukiSU_patch/other/zram/lz4k_oplus ./common/lib/
             
             # Apply patches
             cd ./common

             sed -i 's/-32,12 +32,38/-32,11 +32,37/g' 50_add_susfs_in_${SUSFS_BRANCH}.patch
             sed -i '/#include <trace\/hooks\/fs.h>/d' 50_add_susfs_in_${SUSFS_BRANCH}.patch

             # 尝试应用 SUSFS 补丁，如果失败则跳过
             if ! patch -p1 < 50_add_susfs_in_${SUSFS_BRANCH}.patch; then
               echo "SUSFS patch failed, disabling SUSFS features"
               echo "SUSFS_DISABLED=true" >> $GITHUB_ENV
             fi
             
             if [ "$SUSFS_DISABLED" != "true" ]; then
               cp ../../SukiSU_patch/hooks/syscall_hooks.patch ./
               patch -p1 -F 3 < syscall_hooks.patch || echo "syscall_hooks patch failed, continuing..."
               echo "SUSFS setup completed"
             fi
           else
             echo "SUSFS is disabled due to kernel version incompatibility"
           fi
      
      - name: Apply HMBird GKI patch
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         cd kernel_workspace/kernel_platform/common/drivers
         cat << 'EOF' > hmbird_patch.c
         #include <linux/init.h>
         #include <linux/module.h>
         #include <linux/of.h>
         #include <linux/slab.h>
         #include <linux/string.h>

         static int __init hmbird_patch_init(void)
         {
             struct device_node *ver_np;
             const char *type;
             int ret;

             ver_np = of_find_node_by_path("/soc/oplus,hmbird/version_type");
             if (!ver_np) {
                  pr_info("hmbird_patch: version_type node not found\n");
                  return 0;
             }

             ret = of_property_read_string(ver_np, "type", &type);
             if (ret) {
                  pr_info("hmbird_patch: type property not found\n");
                  of_node_put(ver_np);
                  return 0;
             }

             if (strcmp(type, "HMBIRD_OGKI")) {
                  of_node_put(ver_np);
                  return 0;
             }

             struct property *prop = of_find_property(ver_np, "type", NULL);
             if (prop) {
                  struct property *new_prop = kmalloc(sizeof(*prop), GFP_KERNEL);
                  if (!new_prop) {
                       pr_info("hmbird_patch: kmalloc for new_prop failed\n");
                       of_node_put(ver_np);
                       return 0;
             }
             memcpy(new_prop, prop, sizeof(*prop));
             new_prop->value = kmalloc(strlen("HMBIRD_GKI") + 1, GFP_KERNEL);
             if (!new_prop->value) {
                  pr_info("hmbird_patch: kmalloc for new_prop->value failed\n");
                  kfree(new_prop);
                  of_node_put(ver_np);
                  return 0;
            }
            strcpy(new_prop->value, "HMBIRD_GKI");
            new_prop->length = strlen("HMBIRD_GKI") + 1;

            if (of_remove_property(ver_np, prop) != 0) {
                 pr_info("hmbird_patch: of_remove_property failed\n");
                 return 0;
            }
            if (of_add_property(ver_np, new_prop) !=0) {
                 pr_info("hmbird_patch: of_add_property failed\n");
                 return 0;
            }
            pr_info("hmbird_patch: success from HMBIRD_OGKI to HMBIRD_GKI\n");
         }
         else {
             pr_info("hmbird_patch: type property structure not found\n");
         }
         of_node_put(ver_np);
         return 0;
         }
         early_initcall(hmbird_patch_init);
         MODULE_LICENSE("GPL");
         MODULE_AUTHOR("reigadegr");
         MODULE_DESCRIPTION("Forcefully convert HMBIRD_OGKI to HMBIRD_GKI.");
         EOF
         if ! grep -q "hmbird_patch.o" Makefile; then
         echo "obj-y += hmbird_patch.o" >> Makefile
         fi
         cd ../../../
         git add -A
         git commit -m "Add HMBird GKI patch" || true

 
      - name: Apply lz4kd Patches
        if: steps.check.outputs.should_cancel != 'yes' && env.SUSFS_DISABLED != 'true'
        run: |
          cd kernel_workspace/kernel_platform/common
          # 检查内核版本，选择合适的 LZ4KD 补丁
          KERNEL_VERSION="${{ steps.kernel_version.outputs.kernel_version }}"
          echo "Applying LZ4KD patches for kernel version: $KERNEL_VERSION"
          
          # 根据内核版本选择 LZ4KD 补丁
          if [[ "$KERNEL_VERSION" == 6.6* ]] || [[ "$KERNEL_VERSION" == 6.7* ]] || [[ "$KERNEL_VERSION" == 6.8* ]] || [[ "$KERNEL_VERSION" == 6.9* ]]; then
            LZ4KD_PATCH="../../SukiSU_patch/other/zram/zram_patch/6.6/lz4kd.patch"
          elif [[ "$KERNEL_VERSION" == 6.1* ]]; then
            LZ4KD_PATCH="../../SukiSU_patch/other/zram/zram_patch/6.1/lz4kd.patch"
          else
            LZ4KD_PATCH="../../SukiSU_patch/other/zram/zram_patch/5.15/lz4kd.patch"
          fi
          
          # 检查补丁文件是否存在
          if [ -f "$LZ4KD_PATCH" ]; then
            cp "$LZ4KD_PATCH" ./
            if ! patch -p1 -F 3 < lz4kd.patch; then
              echo "LZ4KD patch failed, but continuing..."
            else
              echo "LZ4KD patch applied successfully"
            fi
          else
            echo "LZ4KD patch not found for kernel version $KERNEL_VERSION, skipping..."
          fi
           
      - name: Add Basic Configuration Settings
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig

          # Add BBR
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BIC=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_CUBIC=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_HTCP=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
          
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "BUILD Kernel"

      - name: Add SUSFS Configuration Settings
        if: steps.check.outputs.should_cancel != 'yes' && env.SUSFS_DISABLED != 'true'
        run: |
          cd kernel_workspace/kernel_platform

          # Add VFS configuration settings
          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          # Add SUSFS configuration settings
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "BUILD Kernel"
      
      - name: Add KPM Configuration Settings
        if: ${{inputs.enable_feature_x && steps.check.outputs.should_cancel != 'yes'}}
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
         
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "BUILD Kernel"
          
      - name: Add make name
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         cd kernel_workspace/kernel_platform
         sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
         sudo sed -i 's/-4k/-android15-8-g7b1f455c7143-ab13591283-4k/g' ./common/arch/arm64/configs/gki_defconfig
        
      - name: Add sched_ext
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         cd kernel_workspace/kernel_platform/
         git clone https://github.com/HanKuCha/sched_ext.git
         cp -r ./sched_ext/* ./common/kernel/sched
         rm -rf ./sched_ext/.git
         cd common/kernel/sched  

      - name: Build Kernel
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          export KBUILD_BUILD_TIMESTAMP="Tue Jun 3 03:22:33 UTC 2025"
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r450784e/bin:$PATH"
          export PATH="/usr/lib/ccache:$PATH"
          sudo apt install libelf-dev
          cd kernel_workspace/kernel_platform/common
          echo "=== Checking LLVM tools ==="
          which llvm-ar || echo "llvm-ar not found in PATH"
          ls -la $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/ || echo "clang host directory not found"
          ls -la $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r450784e/bin/llvm* || echo "LLVM tools not found in expected location"
          echo "=== Listing actual clang versions ==="
          ls -la $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/ || echo "No clang versions found"
          echo "=== Starting build ==="
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS_PERF+=-O3 gki_defconfig all
          
      - name: Apply Linux Patch
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         cd kernel_workspace/kernel_platform/common/out/arch/arm64/boot
         curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
         chmod +x patch_linux
         ./patch_linux
         rm -f Image
         mv oImage Image
         
      - name: Make AnyKernel3
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1      
         rm -rf ./AnyKernel3/.git
         rm -rf ./AnyKernel3/push.sh
         cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/

      - name: Upload AnyKernel3
        if: steps.check.outputs.should_cancel != 'yes'
        uses: actions/upload-artifact@v4
        with:
         name: SukiSU_${{ env.KSUVER }}_OnePlus_Ace_2_Pro
         path: ./AnyKernel3/*

      - name: Create AnyKernel3 ZIP
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
         cd ./AnyKernel3/
         zip -r ./OnePlus_Ace_2_Pro_SukiSU_${{ env.KSUVER }}.zip *

      - name: Create Release
        if: ${{!inputs.enable_feature_z && steps.check.outputs.should_cancel != 'yes'}}
        uses: softprops/action-gh-release@v1
        with:
         name: Release ${{ env.DATE }}
         body: 一加Ace 2 Pro SukiSU_${{ env.KSUVER }}
         tag_name: ${{ env.KSUVER }}
         prerelease: true
         files: ./AnyKernel3/*.zip
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
